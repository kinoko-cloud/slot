    <script>
    function toggleDay(header) {
        const card = header.closest('.uh-day-card');
        const body = card.querySelector('.uh-day-body');
        const toggle = card.querySelector('.uh-day-toggle');
        const isOpen = card.classList.contains('open');

        if (isOpen) {
            body.style.display = 'none';
            card.classList.remove('open');
            toggle.textContent = '▼';
        } else {
            body.style.display = '';
            card.classList.add('open');
            toggle.textContent = '▲';
        }
    }
    
/* === 共通: 動的モード切替 + 現在時刻 === */
(function() {
    function getJST() {
        var now = new Date();
        return new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
    }
    function getDisplayMode() {
        var jst = getJST();
        var h = jst.getHours(), m = jst.getMinutes();
        if (h < 10) return 'before_open';
        if (h >= 23 || (h === 22 && m >= 50)) return 'after_close';
        return 'realtime';
    }
    function updateModeBadge() {
        var mode = getDisplayMode();
        var badge = document.querySelector('.mode-badge');
        if (!badge) return;
        badge.className = 'mode-badge';
        if (mode === 'before_open') {
            badge.classList.add('before-open');
            badge.textContent = '🌙 営業前';
        } else if (mode === 'after_close') {
            badge.classList.add('after-close');
            badge.textContent = '🔒 閉店後';
        } else {
            badge.classList.add('realtime');
            badge.textContent = '🟢 営業中';
        }
    }
    function updateCurrentTime() {
        var jst = getJST();
        var hh = String(jst.getHours()).padStart(2, '0');
        var mi = String(jst.getMinutes()).padStart(2, '0');
        var el = document.getElementById('current-time');
        if (el) el.textContent = hh + ':' + mi;
    }
    updateModeBadge();
    updateCurrentTime();
    setInterval(function() {
        updateModeBadge();
        updateCurrentTime();
    }, 60000);
})();
    </script>
